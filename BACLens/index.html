<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Control & Vulnerability Analyzer</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <div class="brand">
    <h1>BAC Lens</h1>
    <p>
      A tool to demonstrate and analyze the paper
      <em>Broken from the Beginning: Access Control Practices in Web App Tutorials</em>.
    </p>
  </div>

  <div class="supported-frameworks">
    <span class="framework-label">Supported Frameworks</span>
    <span class="badge">Spring</span>
    <span class="badge">Django</span>
  </div>
</header>
<main>
  <div class="panel" id="inputPanel">
    <div class="panel-header">
      <span>Input</span>
      <div class="toolbar">
        <button class="btn" id="sampleBtn" type="button">Sample</button>
        <button class="btn" id="clearBtn" type="button">Clear</button>
      </div>
    </div>
    <div class="panel-body">
      <label class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept=".html,.htm,.md,.markdown,.txt">
        <div>Drop HTML or Markdown file here<br><small>or click to browse</small></div>
      </label>
      <textarea class="raw-input" id="rawInput" placeholder="Or paste HTML / Markdown content here..."></textarea>
      <div style="margin-top:12px; text-align:right;">
        <button class="btn" id="analyzeBtn" type="button">Analyze</button>
      </div>
    </div>
  </div>
  <div class="panel" id="outputPanel">
    <div class="panel-header"><span>Analysis Results</span><span id="resultCount" style="font-size:12px;color:var(--text-secondary);"></span></div>
    <div class="panel-body" id="resultsBody">
      <div class="empty-state">Upload or paste content, then click Analyze.</div>
    </div>
  </div>
</main>

<script type="module" src="app.js"></script>
</body>
</html>
